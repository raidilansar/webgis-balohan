<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="initial-scale=1,user-scalable=no,maximum-scale=1,width=device-width">
        <meta name="mobile-web-app-capable" content="yes">
        <meta name="apple-mobile-web-app-capable" content="yes">
        <link rel="stylesheet" href="css/leaflet.css">
        <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
        <link rel="stylesheet" href="css/qgis2web.css">
        <link rel="stylesheet" href="css/fontawesome-all.min.css">
        <link rel="stylesheet" href="css/leaflet.photon.css">
        <style>
html, body{
    width:100%;
    height:100%;
    padding:0;
    margin:0;
    font-family:Arial,sans-serif;
}

#header{
    background:#1f4e79;
    color:white;
    text-align:center;
    padding:15px;
    font-size:24px;
    font-weight:bold;
    box-shadow:0 2px 5px rgba(0,0,0,0.3);
}

#header span{
    font-size:14px;
    font-weight:normal;
}

#map{
    width:100%;
    height:92vh;
}

.leaflet-control-layers{
    font-size:12px;
}

.leaflet-popup-content{
    font-size:14px;
}
</style>
        <title></title>
    </head>
    <body>

<div id="header">
WEB GIS GAMPONG BALOHAN
<br>
<span>Kecamatan Sukajaya - Kota Sabang</span>
</div>

<div id="map">
        </div>
        <script src="js/qgis2web_expressions.js"></script>
        <script src="js/leaflet.js"></script>
        <script src="js/L.Control.Layers.Tree.min.js"></script>
        <script src="js/leaflet.rotatedMarker.js"></script>
        <script src="js/leaflet.pattern.js"></script>
        <script src="js/leaflet-hash.js"></script>
        <script src="js/Autolinker.min.js"></script>
        <script src="js/rbush.min.js"></script>
        <script src="js/labelgun.min.js"></script>
        <script src="js/labels.js"></script>
        <script src="js/leaflet.photon.js"></script>
        <script src="data/batasbalohan_1.js"></script>
        <script src="data/jalan_2.js"></script>
        <script src="data/fasilitas_3.js"></script>
        <script>
        var map = L.map('map', {
            zoomControl:false, maxZoom:28, minZoom:1
        }).fitBounds([[5.829737185025572,95.3418132104112],[5.839159626067881,95.35817477209689]]);
        var hash = new L.Hash(map);
        map.attributionControl.setPrefix('<a href="https://github.com/qgis2web/qgis2web" target="_blank">qgis2web</a> &middot; <a href="https://leafletjs.com" title="A JS library for interactive maps">Leaflet</a> &middot; <a href="https://qgis.org">QGIS</a>');
        var autolinker = new Autolinker({truncate: {length: 30, location: 'smart'}});
        // remove popup's row if "visible-with-data"
        function removeEmptyRowsFromPopupContent(content, feature) {
         var tempDiv = document.createElement('div');
         tempDiv.innerHTML = content;
         var rows = tempDiv.querySelectorAll('tr');
         for (var i = 0; i < rows.length; i++) {
             var td = rows[i].querySelector('td.visible-with-data');
             var key = td ? td.id : '';
             if (td && td.classList.contains('visible-with-data') && feature.properties[key] == null) {
                 rows[i].parentNode.removeChild(rows[i]);
             }
         }
         return tempDiv.innerHTML;
        }
        // modify popup if contains media
        function addClassToPopupIfMedia(content, popup) {
            var tempDiv = document.createElement('div');
            tempDiv.innerHTML = content;
            var imgTd = tempDiv.querySelector('td img');
            if (imgTd) {
                var src = imgTd.getAttribute('src');
                if (/\.(jpg|jpeg|png|gif|bmp|webp|avif)$/i.test(src)) {
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.update();
                    }, 10);
                } else if (/\.(mp3|wav|ogg|aac)$/i.test(src)) {
                    var audio = document.createElement('audio');
                    audio.controls = true;
                    audio.src = src;
                    imgTd.parentNode.replaceChild(audio, imgTd);
                    popup._contentNode.classList.add('media');
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else if (/\.(mp4|webm|ogg|mov)$/i.test(src)) {
                    var video = document.createElement('video');
                    video.controls = true;
                    video.src = src;
                    video.style.width = "400px";
                    video.style.height = "300px";
                    video.style.maxHeight = "60vh";
                    video.style.maxWidth = "60vw";
                    imgTd.parentNode.replaceChild(video, imgTd);
                    popup._contentNode.classList.add('media');
                    // Aggiorna il popup quando il video carica i metadati
                    video.addEventListener('loadedmetadata', function() {
                        popup.update();
                    });
                    setTimeout(function() {
                        popup.setContent(tempDiv.innerHTML);
                        popup.update();
                    }, 10);
                } else {
                    popup._contentNode.classList.remove('media');
                }
            } else {
                popup._contentNode.classList.remove('media');
            }
        }
        var zoomControl = L.control.zoom({
            position: 'topleft'
        }).addTo(map);
        var bounds_group = new L.featureGroup([]);
        function setBounds() {
        }
        map.createPane('pane_OpenStreetMap_0');
        map.getPane('pane_OpenStreetMap_0').style.zIndex = 400;
        var layer_OpenStreetMap_0 = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            pane: 'pane_OpenStreetMap_0',
            opacity: 1.0,
            attribution: '',
            minZoom: 1,
            maxZoom: 28,
            minNativeZoom: 0,
            maxNativeZoom: 19
        });
        layer_OpenStreetMap_0;
        map.addLayer(layer_OpenStreetMap_0);
        function pop_batasbalohan_1(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['raidil'] !== null ? autolinker.link(String(feature.properties['raidil']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_batasbalohan_1_0() {
            return {
                pane: 'pane_batasbalohan_1',
                opacity: 1,
                color: '#5D4037',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 3, 
                fill: true,
                fillOpacity: 0.5,
                fillColor: '#D7CCC8',
                interactive: true,
            }
        }
        map.createPane('pane_batasbalohan_1');
        map.getPane('pane_batasbalohan_1').style.zIndex = 401;
        map.getPane('pane_batasbalohan_1').style['mix-blend-mode'] = 'normal';
        var layer_batasbalohan_1 = new L.geoJson(json_batasbalohan_1, {
            attribution: 'Esri World Imagery',
            interactive: true,
            dataVar: 'json_batasbalohan_1',
            layerName: 'layer_batasbalohan_1',
            pane: 'pane_batasbalohan_1',
            onEachFeature: pop_batasbalohan_1,
            style: style_batasbalohan_1_0,
        });
        bounds_group.addLayer(layer_batasbalohan_1);
        map.addLayer(layer_batasbalohan_1);
        function pop_jalan_2(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['id'] !== null ? autolinker.link(String(feature.properties['id']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['nama'] !== null ? autolinker.link(String(feature.properties['nama']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['jenis'] !== null ? autolinker.link(String(feature.properties['jenis']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_jalan_2_0() {
            return {
                pane: 'pane_jalan_2',
                opacity: 1,
                color: '#000000',
                dashArray: '',
                lineCap: 'round',
                lineJoin: 'round',
                weight: 3,
                fillOpacity: 0,
                interactive: true,
            }
        }
        map.createPane('pane_jalan_2');
        map.getPane('pane_jalan_2').style.zIndex = 402;
        map.getPane('pane_jalan_2').style['mix-blend-mode'] = 'normal';
        var layer_jalan_2 = new L.geoJson(json_jalan_2, {
            attribution: '',
            interactive: true,
            dataVar: 'json_jalan_2',
            layerName: 'layer_jalan_2',
            pane: 'pane_jalan_2',
            onEachFeature: pop_jalan_2,
            style: style_jalan_2_0,
        });
        bounds_group.addLayer(layer_jalan_2);
        map.addLayer(layer_jalan_2);
        function pop_fasilitas_3(feature, layer) {
            var popupContent = '<table>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['id'] !== null ? autolinker.link(String(feature.properties['id']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['nama'] !== null ? autolinker.link(String(feature.properties['nama']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                    <tr>\
                        <td colspan="2">' + (feature.properties['jenis'] !== null ? autolinker.link(String(feature.properties['jenis']).replace(/'/g, '\'').toLocaleString()) : '') + '</td>\
                    </tr>\
                </table>';
            var content = removeEmptyRowsFromPopupContent(popupContent, feature);
			layer.on('popupopen', function(e) {
				addClassToPopupIfMedia(content, e.popup);
			});
			layer.bindPopup(content, { maxHeight: 400 });
        }

        function style_fasilitas_3_0() {
            return {
                pane: 'pane_fasilitas_3',
                radius: 8.0,
                opacity: 1,
                color: '#ff0000',
                dashArray: '',
                lineCap: 'butt',
                lineJoin: 'miter',
                weight: 1,
                fill: true,
                fillOpacity: 1,
                fillColor: 'rgba(190,178,151,1.0)',
                interactive: true,
            }
        }
        map.createPane('pane_fasilitas_3');
        map.getPane('pane_fasilitas_3').style.zIndex = 403;
        map.getPane('pane_fasilitas_3').style['mix-blend-mode'] = 'normal';
        var layer_fasilitas_3 = new L.geoJson(json_fasilitas_3, {
            attribution: '',
            interactive: true,
            dataVar: 'json_fasilitas_3',
            layerName: 'layer_fasilitas_3',
            pane: 'pane_fasilitas_3',
            onEachFeature: pop_fasilitas_3,
            pointToLayer: function (feature, latlng) {
                var context = {
                    feature: feature,
                    variables: {}
                };
                return L.circleMarker(latlng, style_fasilitas_3_0(feature));
            },
        });
        bounds_group.addLayer(layer_fasilitas_3);
        map.addLayer(layer_fasilitas_3);
	var overlays = {
    "Batas Balohan": layer_batasbalohan_1,
    "Jalan": layer_jalan_2,
    "Fasilitas": layer_fasilitas_3
};

L.control.layers(null, overlays, {
    collapsed:false
}).addTo(map);
        setBounds();
        </script>        
    </body>
</html>
